name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate_deployment_config:
    name: Validate Deployment Config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Validate Docker and workflow YAML
        run: just validate-deployment
